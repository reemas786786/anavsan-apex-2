      /* No scrollbar utility */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Custom Anavsan Scrollbar */
      /* For Webkit browsers like Chrome, Safari, Edge */
      ::-webkit-scrollbar {
        width: 8px; /* Width of the vertical scrollbar */
        height: 8px; /* Height of the horizontal scrollbar */
      }

      ::-webkit-scrollbar-track {
        background: transparent; /* Makes the track invisible */
      }

      ::-webkit-scrollbar-thumb {
        background-color: var(--color-text-muted); /* The draggable scrolling handle */
        border-radius: 4px; /* Rounded corners */
        border: 2px solid transparent; /* Creates padding around the thumb */
        background-clip: content-box; /* The background is clipped to the content box */
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background-color: var(--color-text-secondary); /* Color on hover */
      }

      /* Custom Thin Chat Scrollbar */
      .chat-custom-scroll::-webkit-scrollbar {
        width: 3px;
        height: 3px;
      }
      .chat-custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-custom-scroll::-webkit-scrollbar-thumb {
        background-color: rgba(105, 50, 213, 0.12);
        border-radius: 2px;
        border: none;
        background-clip: normal;
      }
      .chat-custom-scroll::-webkit-scrollbar-thumb:hover {
        background-color: rgba(105, 50, 213, 0.25);
      }
      .dark .chat-custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      /* For Firefox */
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--color-text-muted) transparent;
      }

      /* Splash Loader Styles */
      #static-splash-loader, #react-splash-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--color-background, #F4F1F9);
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      .splash-bg {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 340px;
        background: transparent;
      }
      .ring-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        animation: fade-in 0.6s ease both;
      }
      .ring-rotate {
        position: absolute;
        top: 0; left: 0;
        width: 120px; height: 120px;
        animation: rotate 1.8s linear infinite;
        transform-origin: 60px 60px;
      }
      .logo-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

        color: var(--color-text-secondary, #5A5A72);
        animation: fade-in 0.9s ease 0.3s both;
        text-transform: uppercase;

      .brand-sub {
        margin-top: 6px;
        font-size: 12px;
        color: var(--color-text-muted, #9A9AB2);
        animation: fade-in 1s ease 0.5s both;

    <script>
      // Fail-safe to guarantee that splash loaders are hidden after a maximum of 1.5 seconds,
      // avoiding any potential infinite loading states or loop conditions at initial render.
      setTimeout(function() {
        var staticSplash = document.getElementById('static-splash-loader');
        if (staticSplash) {
          staticSplash.style.transition = 'opacity 0.4s ease';
          staticSplash.style.opacity = '0';
          setTimeout(function() {
            staticSplash.style.display = 'none';
          }, 400);
        }
        var reactSplash = document.getElementById('react-splash-loader');
        if (reactSplash) {
          reactSplash.style.transition = 'opacity 0.4s ease';
          reactSplash.style.opacity = '0';
          setTimeout(function() {
            reactSplash.style.display = 'none';
          }, 400);
        }
      }, 1500);
    </script>
